<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}mailtrim{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: flex; }
    .htmx-request.htmx-indicator { display: flex; }
  </style>
</head>
<body class="h-full bg-slate-50">

<div class="flex h-full min-h-screen">

  <!-- Sidebar -->
  <aside class="w-52 bg-slate-950 flex flex-col fixed inset-y-0 left-0 z-20 border-r border-slate-800">

    <!-- Brand -->
    <div class="px-4 pt-5 pb-4 border-b border-slate-800/60">
      <div class="flex items-center gap-2.5">
        <span class="text-teal-400 text-lg leading-none">✂</span>
        <span class="text-white font-semibold text-sm tracking-wide">mailtrim</span>
        <span class="text-slate-600 text-xs ml-auto">v{{ version }}</span>
      </div>
      <!-- AI mode badge -->
      <div class="mt-2.5">
        {% if ai_mode == "cloud" %}
        <span class="inline-flex items-center gap-1.5 text-xs font-medium text-amber-300 bg-amber-900/30 border border-amber-800/40 px-2 py-0.5 rounded-full">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span>AI cloud
        </span>
        {% elif ai_mode == "local" %}
        <span class="inline-flex items-center gap-1.5 text-xs font-medium text-teal-300 bg-teal-900/30 border border-teal-800/40 px-2 py-0.5 rounded-full">
          <span class="w-1.5 h-1.5 rounded-full bg-teal-400"></span>AI local
        </span>
        {% else %}
        <span class="inline-flex items-center gap-1.5 text-xs font-medium text-slate-500 bg-slate-800/60 border border-slate-700/40 px-2 py-0.5 rounded-full">
          <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>AI off
        </span>
        {% endif %}
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
      <a href="/"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                {% if active == 'dashboard' %}text-white bg-slate-800{% else %}text-slate-400 hover:text-white hover:bg-slate-800/60{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>

      <a href="/stats"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                {% if active == 'stats' %}text-white bg-slate-800{% else %}text-slate-400 hover:text-white hover:bg-slate-800/60{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Stats
      </a>

      <a href="/undo"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                {% if active == 'undo' %}text-white bg-slate-800{% else %}text-slate-400 hover:text-white hover:bg-slate-800/60{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
        </svg>
        Undo History
      </a>

      <a href="/settings"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors
                {% if active == 'settings' %}text-white bg-slate-800{% else %}text-slate-400 hover:text-white hover:bg-slate-800/60{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Settings
      </a>
    </nav>

    <!-- Footer -->
    <div class="px-4 py-3 border-t border-slate-800/60">
      <p class="text-slate-600 text-xs">Runs 100% locally</p>
      <p class="text-slate-700 text-xs">Nothing leaves your machine</p>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 ml-52 min-h-screen">
    {% block content %}{% endblock %}
  </main>

</div>

</body>
</html>
