{% extends "base.html" %}
{% block title %}Error — postmind{% endblock %}
{% block content %}

<div class="min-h-screen flex items-center justify-center p-8">
  <div class="pm-card max-w-md w-full p-8 text-center">
    <div class="mx-auto mb-5 flex items-center justify-center w-12 h-12 rounded-full bg-danger-bg border border-danger-border">
      <!-- Lucide: alert-triangle -->
      <svg class="w-6 h-6 text-danger" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4M12 17h.01"/>
      </svg>
    </div>
    <p class="text-ink text-base font-semibold">Something went wrong</p>
    <p class="text-ink-muted text-sm mt-2">{{ error }}</p>
    <div class="mt-6 flex items-center justify-center gap-3">
      <a href="/" class="pm-btn">
        <!-- Lucide: home -->
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/>
        </svg>
        Go to dashboard
      </a>
      <a href="/stats" class="pm-btn-secondary">
        <!-- Lucide: rotate-cw -->
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 4v5h-.582m0 0A8.001 8.001 0 004.582 9m14.836 0H15M4 20v-5h.581m0 0a8.003 8.003 0 0014.837 0M4.581 15H9"/>
        </svg>
        Try Stats again
      </a>
    </div>
  </div>
</div>

{% endblock %}
